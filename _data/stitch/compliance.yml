- id: "fedramp"
  name: "FedRAMP"
  level: "none"
  tier: ""
  description: |
    Stitch isn't currently certified with the Federal Risk and Authorization Management Program (FedRAMP).

- id: "gdpr"
  name: "GDPR"
  level: "full"
  tier: "all"
  description: |
    Stitch maintains a privacy program built to ensure that we comply with the privacy laws relevant to our business, such as the EU's GDPR.

    Stitch makes a Data Processing Addendum (DPA) available for customer execution found here. The [Qlik Privacy & Cookies Notice](https://www.qlik.com/us/legal/privacy-and-cookie-notice){:target="new"} also includes specific GDPR requirements.

    Additionally, Stitch supports selecting the region in which you'd like your account's replicated data to be processed. Refer to the [Data processing section](#data-processing) for more info.

- id: "hipaa"
  name: "HIPAA"
  level: "full"
  tier: "advanced"
  description: |
    **Stitch can replicate data in a HIPAA-compliant manner as part of an {{ site.data.stitch.subscription-plans.advanced.name }} or {{ site.data.stitch.subscription-plans.premium.name }} plan**. To learn more about replicating data subject to Health Insurance Portability and Accountability Act (HIPAA) regulations with Stitch, contact the [Stitch Sales team]({{ site.sales | append: page.enterprise-utm.url }}).

    **Note**: There are requirements outside of Stitch configuration that must be completed to ensure compliance. Reach out to [Stitch Sales]({{ site.sales | append: page.enterprise-utm.hipaa-url }}) before replicating any sensitive data.
  
- id: "pci"
  name: "PCI"
  level: "some"
  tier: "all"
  description: |
    Stitch doesn't currently support replicating data in a PCI-compliant manner.

    However, all payment information submitted through Stitch's billing interface to pay for your subscription is handled in a PCI-compliant manner.

- id: "eu-uk-data-privacy-framework"
  name: "EU/UK Data Privacy Framework"
  level: "full"
  tier: "all"
  description: |
    Stitch's parent company Qlik is certified under the EU/UK – US Data Privacy Framework.

- id: "soc-2"
  name: "SOC 2"
  level: "full"
  tier: "all"
  description: |
    **Stitch has been certified compliant with the SOC 2 security, availability, and confidentiality principles by an independent auditor.**

    The audit report can be requested by contacting [Stitch Sales]({{ site.sales | append: page.enterprise-utm.soc2-url }}).